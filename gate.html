<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOMES — Guidebook</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#FFCF0D;--navy:#020425;--cream:#F4F2EC;--line:#E7DDC6;
  --gray:#6F7A83;--soft:#f6f7f9;--font:'Outfit','Pretendard',-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--cream);color:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
.logo{font-size:22px;font-weight:800;letter-spacing:.18em;color:#FFCF0D;margin-bottom:28px;text-align:center}
.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:36px 32px 32px;width:100%;max-width:380px;text-align:center;}
.badge-studio{display:inline-block;background:var(--navy);color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 12px;border-radius:6px;margin-bottom:14px;}
.badge-accomo{display:inline-block;background:#7b8fa8;color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 12px;border-radius:6px;margin-bottom:14px;}
.card-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:6px;line-height:1.3}
.card-sub{font-size:13px;color:var(--gray);margin-bottom:24px;line-height:1.6;word-break:keep-all}
.input-wrap{position:relative;margin-bottom:10px}
input[type="text"]{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;font-family:var(--font);font-size:18px;font-weight:600;color:var(--navy);background:var(--soft);outline:none;text-align:center;transition:border-color .2s;}
input:focus{border-color:var(--navy);background:#fff}
input.error{border-color:#e53e3e;background:#fff5f5}
.error-msg{font-size:12px;color:#e53e3e;margin-bottom:12px;min-height:16px;display:none}
.error-msg.show{display:block}
.btn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;}
.btn:hover{opacity:.88}
.back-btn{margin-top:16px;background:none;border:none;font-family:var(--font);font-size:13px;color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.back-btn:hover{color:var(--navy)}
.success-overlay{display:none;flex-direction:column;align-items:center;gap:12px}
.success-overlay.show{display:flex}
.card.success-mode>*:not(.success-overlay){display:none!important}
.card.success-mode .success-overlay{display:flex}
.check-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
@media(max-width:420px){.card{padding:28px 18px 24px}.card-title{font-size:17px}}
</style>
</head>
<body>

<div class="logo">HOMES</div>

<div class="card" id="card">
  <span id="badgeEl" class="badge-studio">HOMES STUDIO</span>
  <h1 class="card-title" id="titleEl">안암</h1>
  <p class="card-sub" id="subEl">입주민 전용 페이지입니다. 비밀번호를 입력해 주세요.</p>

  <div class="input-wrap">
    <input type="text" id="pwInput" maxlength="20"
           placeholder="비밀번호 입력" autocomplete="off"
           autocorrect="off" autocapitalize="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')checkPw()">
  </div>

  <p class="error-msg" id="errMsg">비밀번호가 올바르지 않습니다.</p>

  <button class="btn" id="submitBtn" onclick="checkPw()">
    <span id="btnText">가이드북 열기</span>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>

  <button class="back-btn" onclick="goBack()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span id="backText">지점 선택으로 돌아가기</span>
  </button>

  <div class="success-overlay" id="successOverlay">
    <div class="check-circle" id="checkCircle">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <p style="font-size:17px;font-weight:700;color:var(--navy)" id="successTitle">확인되었습니다</p>
    <p style="font-size:13px;color:var(--gray)" id="successSub">가이드북 페이지로 이동합니다…</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zyeumxtemfmkbpviuxeo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5ZXVteHRlbWZta2Jwdml1eGVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTkzNTUsImV4cCI6MjA5NzQzNTM1NX0.5v8SehoApGrqDwuvtwNRWJcWaStcPnS94AD3FO33ya4';

const BRANCH_INFO = {
  anam:          { nameKo:'홈즈 스튜디오 안암',   nameEn:'Homes Studio Anam',          brand:'studio' },
  seonjeongneung:{ nameKo:'홈즈 스튜디오 선정릉', nameEn:'Homes Studio Seonjeongneung', brand:'studio' },
  namyeong:      { nameKo:'홈즈 스튜디오 남영',   nameEn:'Homes Studio Namyeong',       brand:'studio' },
  gasan:         { nameKo:'아코모 가산',           nameEn:'Accomo Gasan',                brand:'accomo' },
  hoegi:         { nameKo:'아코모 회기',           nameEn:'Accomo Hoegi',                brand:'accomo' },
};

const params   = new URLSearchParams(window.location.search);
const branchId = params.get('branch') || 'anam';
const lang     = params.get('lang') || 'ko';
const info     = BRANCH_INFO[branchId];
const isKo     = lang === 'ko';

let correctPw = null;
let targetUrl = null;

async function loadBranch() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/branches?id=eq.${branchId}&select=password,url`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await res.json();
    if (data && data[0]) {
      correctPw = data[0].password;
      targetUrl = data[0].url;
    }
  } catch(e) { console.error(e); }
}

if (info) {
  const badgeEl = document.getElementById('badgeEl');
  badgeEl.textContent = info.brand === 'studio' ? 'HOMES STUDIO' : 'ACCOMO';
  badgeEl.className   = info.brand === 'studio' ? 'badge-studio' : 'badge-accomo';
  document.getElementById('titleEl').textContent  = isKo ? info.nameKo : info.nameEn;
  document.getElementById('subEl').textContent    = isKo ? '입주민 전용 페이지입니다. 비밀번호를 입력해 주세요.' : 'Residents only. Please enter your password.';
  document.getElementById('btnText').textContent  = isKo ? '가이드북 열기' : 'Open Guidebook';
  document.getElementById('backText').textContent = isKo ? '지점 선택으로 돌아가기' : 'Back to branch selection';
  document.getElementById('successTitle').textContent = isKo ? '확인되었습니다' : 'Verified';
  document.getElementById('successSub').textContent   = isKo ? '가이드북 페이지로 이동합니다…' : 'Redirecting…';
  document.getElementById('errMsg').textContent        = isKo ? '비밀번호가 올바르지 않습니다.' : 'Incorrect password.';
  const circle = document.getElementById('checkCircle');
  circle.style.background = info.brand === 'studio' ? 'var(--navy)' : 'var(--gold)';
  circle.querySelector('svg').setAttribute('stroke', info.brand === 'studio' ? '#fff' : 'var(--navy)');
  document.title = (isKo ? info.nameKo : info.nameEn) + ' — Guidebook';
} else {
  document.getElementById('card').innerHTML = `<p style="font-size:32px;margin-bottom:12px">🏠</p><p style="font-weight:700;font-size:16px;color:var(--navy);margin-bottom:8px">페이지를 찾을 수 없습니다</p><p style="font-size:13px;color:var(--gray)">올바른 링크로 다시 접속해 주세요.</p>`;
}

loadBranch();

function checkPw() {
  if (!info) return;
  const val   = document.getElementById('pwInput').value.replace(/\s/g, '');
  const input = document.getElementById('pwInput');
  const err   = document.getElementById('errMsg');

  if (correctPw === null) {
    err.textContent = isKo ? '잠시 후 다시 시도해 주세요.' : 'Please try again.';
    err.classList.add('show');
    return;
  }

  if (val === correctPw) {
    err.classList.remove('show');
    input.classList.remove('error');
    document.getElementById('card').classList.add('success-mode');
    document.getElementById('successOverlay').classList.add('show');
    setTimeout(() => { window.location.href = targetUrl; }, 1200);
  } else {
    input.classList.add('error');
    err.classList.add('show');
    input.value = '';
    input.focus();
    input.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:240,easing:'ease-out'});
  }
}

function goBack() {
  const base = window.location.href.split('gate.html')[0];
  window.location.href = base + 'index.html';
}
</script>
</body>
</html>
